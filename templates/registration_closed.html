<!DOCTYPE html>
<html>
<head>
    <title>Registration Closed</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0F172A;
            color:white;
        }

        .closed-card{
            max-width:650px;
            margin:80px auto;
            background:#1E293B;
            padding:45px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 8px 25px rgba(0,0,0,0.4);
        }

        .icon{
            font-size:70px;
        }

        .btn-home{
            background:#F59E0B;
            color:black;
            font-weight:bold;
            border:none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="closed-card">

        <div class="icon">🚫</div>

        <h1 class="mt-3">
            Registration Closed
        </h1>

        <p class="mt-3">
            Sorry, all seats are filled for
            <strong>{{ event.title }}</strong>.
        </p>

        <p class="text-warning">
            Please check other upcoming events.
        </p>

        <a href="/" class="btn btn-home mt-3">
            Back to Home
        </a>

    </div>

</div>

</body>
</html>
