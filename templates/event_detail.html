<!DOCTYPE html>
<html>
<head>
    <title>{{ event.title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0F172A;
            color:white;
        }

        .details-card{
            max-width:800px;
            margin:auto;
            margin-top:50px;
            background:#1E293B;
            border-radius:20px;
            padding:30px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="details-card">

        <span class="badge bg-warning text-dark">
            {{ event.event_type }}
        </span>

        <h1 class="mt-3">
            {{ event.title }}
        </h1>

        <hr>

        <p>📅 {{ event.date }}</p>

        <p>📍 {{ event.location }}</p>

        <p>{{ event.description }}</p>

        <a href="{% url 'register_event' event.id %}"
           class="btn btn-warning">
           Register Now
        </a>

        <a href="/"
           class="btn btn-secondary">
           Back
        </a>

    </div>

</div>

</body>
</html>
