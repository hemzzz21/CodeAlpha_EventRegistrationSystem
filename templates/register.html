<!DOCTYPE html>
<html>
<head>
    <title>Register for Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0F172A;
            color:white;
        }

        .form-card{
            max-width:700px;
            margin:50px auto;
            background:#1E293B;
            padding:35px;
            border-radius:20px;
        }

        .btn-submit{
            background:#F59E0B;
            color:black;
            font-weight:bold;
            border:none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="form-card">

        <h2 class="mb-3">
            Register for {{ event.title }}
        </h2>

        <span class="badge bg-warning text-dark mb-4">
            {{ event.event_type }}
        </span>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="name" class="form-control mb-3" placeholder="Full Name" required>

            <input type="email" name="email" class="form-control mb-3" placeholder="Email Address" required>

            <input type="text" name="phone" class="form-control mb-3" placeholder="Phone Number" required>

            <input type="text" name="college_name" class="form-control mb-3" placeholder="College Name" required>

            <input type="text" name="department" class="form-control mb-3" placeholder="Department" required>

            <select name="current_year" class="form-select mb-3" required>
                <option value="">Select Current Year</option>
                <option>1st Year</option>
                <option>2nd Year</option>
                <option>3rd Year</option>
                <option>4th Year</option>
            </select>

            <button type="submit" class="btn btn-submit w-100">
                Submit Registration
            </button>
        </form>

        <a href="/" class="btn btn-outline-light w-100 mt-3">
            Back to Events
        </a>

    </div>

</div>

</body>
</html>
